<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Almanac — Body Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --blue: #1B8DC8;
  --blue-dark: #156FA0;
  --ink: #0F2D3D;
  --orange: #E05A20;
  --white: #FFFFFF;
  --nav-bg: #145E87;
}

body {
  background: #0D1F2D;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 32px 16px 48px;
  font-family: 'DM Sans', sans-serif;
}

/* ── PHONE SHELL ── */
.phone {
  width: 390px;
  min-height: 844px;
  background: var(--blue);
  border-radius: 48px;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06);
}

/* ── STATUS BAR ── */
.status-bar {
  padding: 14px 28px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
  z-index: 20;
}
.status-time {
  font-size: 15px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: -0.01em;
}
.status-icons {
  display: flex;
  gap: 6px;
  align-items: center;
}
.status-icons span {
  font-size: 13px;
  color: var(--ink);
  opacity: 0.7;
}

/* ── TAB STRIP ── */
.tab-strip {
  display: flex;
  gap: 0;
  padding: 16px 24px 0;
  flex-shrink: 0;
  z-index: 20;
}
.tab-pill {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: rgba(255,255,255,0.55);
  padding: 6px 14px;
  border-radius: 99px;
  cursor: pointer;
  letter-spacing: 0.01em;
  transition: all 0.15s;
  user-select: none;
}
.tab-pill.active {
  background: rgba(255,255,255,0.18);
  color: var(--white);
}
.tab-pill:hover:not(.active) {
  color: rgba(255,255,255,0.75);
}

/* ── FACT TEXT ── */
.fact-text {
  padding: 22px 28px 18px;
  flex-shrink: 0;
  z-index: 20;
  position: relative;
}
.fact-copy {
  font-size: 16px;
  font-weight: 400;
  line-height: 1.55;
  color: var(--ink);
  max-width: 320px;
}
.fact-copy strong { font-weight: 700; }

/* ── ANATOMY HERO ── */
.anatomy-hero {
  flex: 1;
  position: relative;
  overflow: hidden;
  min-height: 420px;
}
.anatomy-hero svg {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

/* ── BOTTOM NAV ── */
.bottom-nav {
  background: var(--nav-bg);
  padding: 16px 20px 28px;
  display: flex;
  gap: 8px;
  flex-shrink: 0;
  z-index: 20;
}
.nav-btn {
  flex: 1;
  padding: 13px 0;
  border-radius: 99px;
  text-align: center;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: rgba(255,255,255,0.6);
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
  text-transform: uppercase;
}
.nav-btn.active {
  background: var(--blue-dark);
  color: var(--white);
}
.nav-btn:hover:not(.active) {
  color: rgba(255,255,255,0.85);
}
</style>
</head>

<script>
const ALL_SVG = ['svgHormonal', 'svgPhysical', 'svgEmotional', 'svgInputs'];

const CONTENT = [
  {
    fact: '<strong>80% of serotonin receptors</strong> in the brain are directly upregulated by estrogen — accounting for the mood lift in follicular phase.',
  },
  {
    fact: 'Estrogen acts as a <strong>vasodilator and bone protector</strong>. HRV peaks in follicular phase. Joint cartilage is more resilient when E2 is high.',
  },
  {
    fact: 'Estrogen reduces <strong>amygdala reactivity</strong> to threat signals. GABA is stable. Your nervous system runs parasympathetic — calm, connected.',
  },
  {
    fact: 'Your gut\'s <strong>estrobolome</strong> — the bacteria that metabolise estrogen — directly shapes your hormonal balance. One bad night of sleep is enough to disrupt it.',
  },
];

function setLayer(idx) {
  document.querySelectorAll('.tab-pill').forEach((t, i) => t.classList.toggle('active', i === idx));
  ALL_SVG.forEach(id => document.getElementById(id).style.display = 'none');
  document.getElementById(ALL_SVG[idx]).style.display = 'block';
  document.getElementById('factCopy').innerHTML = CONTENT[idx].fact;
}

function setNav(idx) {
  document.querySelectorAll('.nav-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  if (idx === 1) setLayer(0);
}
</script>
